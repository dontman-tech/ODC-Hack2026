name: rekollect
description: Re-kollect MVP for real-time recyclable waste pickup requests in Buea, Cameroon.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  flutter_map: ^6.1.0
  google_fonts: ^6.1.0
  http: ^1.2.0
  latlong2: ^0.9.0

flutter:
  uses-material-design: true
